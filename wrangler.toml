name = "ai-chat-wasm"
compatibility_date = "2026-06-05"

main = "worker_shim.js"

[site]
bucket = "./target/site"

[env.production]
name = "ai-chat-wasm"

[build]
command = "RUSTFLAGS=\"--cfg=web_sys_unstable_apis --cfg getrandom_backend=\\\"wasm_js\\\"\" wasm-pack build --target web --out-dir worker_pkg --release -- --features ssr"
